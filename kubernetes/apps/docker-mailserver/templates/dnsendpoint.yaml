apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: blarc-my-id-mail-auth
spec:
  endpoints:
    - dnsName: blarc.my.id
      recordType: TXT
      targets:
        - "v=spf1 ip4:193.77.155.77 -all"
    - dnsName: _dmarc.blarc.my.id
      recordType: TXT
      targets:
        - "v=DMARC1; p=none"
    - dnsName: mail._domainkey.blarc.my.id
      recordType: TXT
      targets:
        - "v=DKIM1; k=rsa; "
    - dnsName: blarc.my.id
      recordType: MX
      targets:
        - "10 mail.blarc.my.id"
