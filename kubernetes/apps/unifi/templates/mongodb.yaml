apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: {{ .Release.Name }}-mongodb
  namespace: {{ .Release.Namespace }}
spec:
  members: 1
  type: ReplicaSet
  version: 4.4.0
  security:
    authentication:
      modes: ["SCRAM"]
  users:
    - name: unifi
      db: admin
      passwordSecretRef:
        name: {{ .Release.Name }}-mongodb-password
      scramCredentialsSecretName: {{ .Release.Name }}-mongodb
      roles:
        - name: clusterMonitor
          db: admin
        - name: dbOwner
          db: unifi
        - name: dbOwner
          db: unifi_stat
        - name: dbOwner
          db: unifi_audit
        - name: dbOwner
          db: unifi_restore