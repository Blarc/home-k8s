sftpgo:
  revisionHistoryLimit: 3

  gatewayApi:
    httpRoutes:
      ui:
        enabled: true
        hostnames:
          - sftpgo.blarc.my.id
        parentRefs:
          - name: internal
            namespace: traefik
      api:
        enabled: true
        hostnames:
          - sftpgo.blarc.my.id
        parentRefs:
          - name: internal
            namespace: traefik

  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
     memory: 1Gi

  config:
    data_provider:
      users_base_dir: /srv/sftpgo/data
      pre_login_hook: /src/sftpgo/hooks/pre-login-hook.sh

  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: data
    - name: pre-login-hook
      configMap:
        name: pre-login-hook
        defaultMode: 0755

  volumeMounts:
    - name: data
      mountPath: /srv/sftpgo/data
    - name: pre-login-hook
      mountPath: /src/sftpgo/hooks

  persistence:
    # -- Enable persistent storage for the /var/lib/sftpgo directory, saving state of the default sqlite db.
    enabled: true
    pvc:
      resources:
        requests:
          storage: 1Gi
      storageClassName: "topolvm-thin"