app-template:
  controllers:
    coturn:
      annotations:
        reloader.stakater.com/auto: "true"
      containers:
        app:
          image:
            repository: docker.io/coturn/coturn
            tag: 4.6.2-r8
          env:
            TZ: Europe/Ljubljana
          args:
            - --listening-ip="0.0.0.0"
            - --listening-port="3478"
            - --tls-listening-port="5349"
            - --realm="coturn.blarc.my.id"
            - --user="$(NETBIRD_USER):$(NETBIRD_PASSWORD)"
            - --lt-cred-mech
            - --cert=/usr/local/etc/tls.crt
            - --pkey=/usr/local/etc/tls.key
            - --log-file=stdout
            - --no-software-attribute
            - --no-cli
          ports:
            - containerPort: 3478
              name: tcp
              protocol: TCP
            - containerPort: 3478
              name: udp
              protocol: UDP
          probes:
            liveness: &probes
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: tcp
            readiness: *probes
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              add: [ NET_BIND_SERVICE ]
              drop: [ ALL ]
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 1000m
  defaultPodOptions:
    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      fsGroup: 65534
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault
  service:
    app:
      type: LoadBalancer
      externalTrafficPolicy: Local
      annotations:
        lbipam.cilium.io/ips: "192.168.1.222"
        external-dns.alpha.kubernetes.io/hostname: "coturn.blarc.my.id"
      ports:
        tcp-tls:
          port: 5349
          protocol: TCP
        udp-tls:
          port: 5349
          protocol: UDP
  persistence:
    config:
      type: configMap
      name: coturn-config
      defaultMode: 0644
      globalMounts:
        - path: /etc/turnserver.conf
          subPath: turnserver.conf
    cert:
      type: secret
      name: coturn-cert
      defaultMode: 0644
      globalMounts:
        - path: /usr/local/etc
