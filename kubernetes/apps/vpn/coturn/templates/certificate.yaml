apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: coturn
  namespace: {{ .Release.Namespace }}
spec:
  dnsNames:
    - coturn.blarc.my.id
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-prod
  secretName: coturn-cert
  usages:
    - digital signature
    - key encipherment