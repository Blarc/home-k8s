apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw
data:
  openclaw.json5: |
    {
      // Models configuration
      "models": {
        "mode": "merge",
        "providers": {
          "nvidia-nim": {
            "baseUrl": "https://integrate.api.nvidia.com/v1",
            "apiKey": "${MOONSHOT_API_KEY}",
            "api": "openai-completions",
            "models": [
              {
                "id": "moonshotai/kimi-k2.5",
                "name": "Kimi K2.5 (NVIDIA)",
                "reasoning": false,
                "input": [
                  "text"
                ],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                },
                "contextWindow": 200000,
                "maxTokens": 8192
              }
            ]
          }
        }
      },
      // Agent configuration
      "agents": {
        "defaults": {
          // "workspace": "/home/node/.openclaw/workspace",
          "model": {
            "primary": "kimi"
          },
          "models": {
            "nvidia-nim/moonshotai/kimi-k2.5": {
              "alias": "kimi"
            }
          },
          "userTimezone": "Europe/Ljubljana",
          "timeoutSeconds": 600,
          "maxConcurrent": 1
        },
        "list": [
          {
            "id": "main",
            "default": true,
            "identity": {
              "name": "Guppi",
              "emoji": "🤖"
            }
          }
        ]
      },
      // Session management
      "session": {
        "scope": "per-sender",
        // "store": "/home/node/.openclaw/sessions",
        // "reset": {
        //   "mode": "idle",
        //   "idleMinutes": 60
        // }
      },
      // Logging
      "logging": {
        "level": "info",
        "consoleLevel": "info",
        "consoleStyle": "compact",
        "redactSensitive": "tools"
      },
      // Gateway Control UI origin allowlist for reverse-proxied UI access.
      "gateway": {
        "controlUi": {
          "allowedOrigins": [
            "https://openclaw.blarc.my.id"
          ],
          "dangerouslyAllowHostHeaderOriginFallback": true
        }
      },
      // Tools configuration
      "tools": {
        "profile": "full",
        "web": {
          "search": {
            "enabled": false
          },
          "fetch": {
            "enabled": true
          }
        }
      }

      // Channel configuration can be added here:
      // "channels": {
      //   "telegram": {
      //     "botToken": "${TELEGRAM_BOT_TOKEN}",
      //     "enabled": true
      //   },
      //   "discord": {
      //     "token": "${DISCORD_BOT_TOKEN}"
      //   },
      //   "slack": {
      //     "botToken": "${SLACK_BOT_TOKEN}",
      //     "appToken": "${SLACK_APP_TOKEN}"
      //   }
      // }
    }
