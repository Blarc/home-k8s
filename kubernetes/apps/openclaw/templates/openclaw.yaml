# https://github.com/openclaw-rocks/openclaw-operator/blob/main/docs/api-reference.md
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: guppi
spec:
  envFrom:
    - secretRef:
        name: openclaw
  resources:
    requests:
      cpu: 10m
  storage:
    persistence:
      enabled: true
      size: 10Gi
  config:
    configMapRef:
      name: openclaw
      key: openclaw.json5
  security:
    networkPolicy:
      allowedIngressNamespaces:
        - traefik
  gateway:
    controlUiOrigins:
      - https://openclaw.blarc.my.id