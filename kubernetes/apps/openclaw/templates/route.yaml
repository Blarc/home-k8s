apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: guppi
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: internal
      namespace: traefik
  hostnames:
    - "openclaw.blarc.my.id"
  rules:
    - backendRefs:
        - name: guppi
          port: 18789
      matches:
        - path:
            type: PathPrefix
            value: /
