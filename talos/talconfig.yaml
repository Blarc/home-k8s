---
# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
clusterName: ${clusterName}
talosVersion: 1.12.6
kubernetesVersion: 1.35.3
endpoint: https://192.168.1.16:6443

cniConfig:
  name: none

nodes:
  - hostname: multi-role
    controlPlane: true
    ipAddress: 192.168.1.16
    networkInterfaces:
      - interface: enp1s0
        dhcp: false
        addresses:
          - 192.168.1.16
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
    installDisk: /dev/sdc
    installDiskSelector:
      model: WDC*
    kernelModules:
      - name: dm_thin_pool
      - name: dm_mod
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/nut-client
    extensionServices:
      # https://github.com/siderolabs/extensions/tree/main/power/nut-client
      - name: nut-client
        configFiles:
          - content: |-
              MONITOR ${upsmonHost} 1 ${upsmonUser} ${upsmonPass} secondary
              SHUTDOWNCMD "/sbin/poweroff"
              MINSUPPLIES 1
              HOSTSYNC 15
              DEADTIME 15
              FINALDELAY 0
            mountPath: /usr/local/etc/nut/upsmon.conf
#    userVolumes:
#      - name: data
#        provisioning:
#          minSize: 128 GB
#          grow: true
#          diskSelector:
#            match: disk.model == "FORESEE 512GB SS"

controlPlane:
  patches:
    - |-
      cluster:
        allowSchedulingOnControlPlanes: true
    - |-
      machine:
        kubelet:
          extraMounts:
            - destination: /var/data
              type: bind
              source: /var/data
              options:
                - bind
                - rshared
                - rw
    # Disable kube-proxy
    - |
      cluster:
        apiServer:
          extraArgs:
            # https://kubernetes.io/docs/tasks/extend-kubernetes/configure-aggregation-layer/
            enable-aggregator-routing: true
        proxy:
          disabled: true
